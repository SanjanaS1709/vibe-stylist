<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeStylist - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --royal-red: #5a0f14;
            --deep: #2b0d0d;
            --gold: #d4af37;
            --text: #f8f6f2;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top right, #6b1016, #2b0d0d);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-box {
            width: 450px;
            padding: 40px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 25px;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            color: var(--gold);
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            background: rgba(43, 13, 13, 0.8);
            color: white;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--gold), #b8860b);
            color: black;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
        }

        a {
            color: var(--gold);
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h1>✨ Join The Vibe</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div style="color: #ffcccc; margin-bottom: 15px; font-size: 14px;">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        <form action="{{ url_for('auth.register') }}" method="POST">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <select name="gender"
                style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 10px; border: 1px solid rgba(212, 175, 55, 0.5); background: rgba(43, 13, 13, 0.8); color: white;">
                <option value="female">Female</option>
                <option value="male">Male</option>
                <option value="non-binary">Non-binary / Other</option>
            </select>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn">Create Account</button>
        </form>
        <p style="margin-top: 20px; font-size: 14px; opacity: 0.7;">Already have an account? <a
                href="{{ url_for('auth.login') }}">Login</a></p>
    </div>
</body>

</html>
