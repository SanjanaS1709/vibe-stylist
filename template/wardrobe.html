<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeStylist - Wardrobe</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    {% set active_page = 'wardrobe' %}
    {% include 'menu.html' %}

    <section class="container">
        <div class="header">
            <div id="wardrobe-title-box">
                <h1 style="color: var(--gold); font-size: 48px; font-weight: 800; margin-bottom: 10px;">My Wardrobe</h1>
                <p style="opacity: 0.8; font-size: 18px;">Your curated collection ✨</p>
            </div>
            <div id="category-title-box" style="display: none; align-items: center; gap: 20px;">
                <button class="back-btn" onclick="showCollections()">← Back</button>
                <h1 id="current-category-name" style="margin: 0; color: var(--gold);">Category</h1>
            </div>
            <button class="add-btn iconic-glow" onclick="openUploadModal()">+ Add Outfit</button>
        </div>

        <!-- CATEGORY FOLDERS VIEW -->
        <div class="grid" id="category-grid">
            <!-- Dynamically populated -->
        </div>

        <!-- ITEMS GRID VIEW (Hidden by default) -->
        <div class="grid" id="items-grid" style="display: none;">
            <!-- Dynamically populated -->
        </div>

        <div id="empty-wardrobe" style="display: none;" class="empty-state">
            <p>Your wardrobe is empty. Add your first piece! 👗</p>
        </div>
    </section>

    <!-- UPLOAD MODAL -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('uploadModal')">&times;</span>
            <h2 style="color: var(--gold); margin-bottom: 20px;">Add New Piece</h2>

            <form id="uploadForm">
                <div class="form-group">
                    <label>Dress Category</label>
                    <select id="itemType" name="item_type" class="modal-select">
                        {% if user_gender == 'Male' %}
                        <option value="shirt">Shirt</option>
                        <option value="pant">Pant / Trouser</option>
                        <option value="kurta">Kurta</option>
                        <option value="suit">Suit / Blazer</option>
                        <option value="shoes">Shoes</option>
                        <option value="accessory">Accessory</option>
                        {% else %}
                        <option value="top">Top / Blouse</option>
                        <option value="pant">Pant / Trouser</option>
                        <option value="kurti">Kurti / Kurta</option>
                        <option value="saree">Saree</option>
                        <option value="dress">One-piece Dress</option>
                        <option value="shoes">Shoes</option>
                        <option value="accessory">Accessory</option>
                        {% endif %}
                    </select>
                </div>

                <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
                    <div id="upload-status-text">Click to upload photo 📸</div>
                    <input type="file" id="fileInput" name="image" style="display: none;" accept="image/*"
                        onchange="handleFile(this)">
                    <img id="uploadPreview" src=""
                        style="display: none; width: 100%; max-height: 200px; object-fit: contain; margin-top: 15px; border-radius: 10px;">
                </div>

                <button type="button" class="add-btn" style="width: 100%; margin-top: 20px;" onclick="uploadItem()">Save
                    to Wardrobe</button>
            </form>
        </div>
    </div>

    <!-- DETAIL MODAL -->
    <div id="detailModal" class="modal">
        <div class="modal-content" style="max-width: 500px; text-align: center;">
            <span class="close" onclick="closeModal('detailModal')">&times;</span>
            <img id="detailImg" src=""
                style="width: 100%; border-radius: 15px; margin-bottom: 10px; background: rgba(255,255,255,0.05);">
            <div style="margin-bottom: 20px;">
                <a id="detailLink" href="" target="_blank"
                    style="color: var(--gold); font-size: 12px; opacity: 0.6; text-decoration: underline;">View Original
                    Image</a>
            </div>
            <h2 id="detailTitle" style="color: var(--gold);"></h2>
            <p id="detailColor" style="opacity: 0.8; margin: 10px 0;"></p>
            <p id="detailTag" style="font-style: italic; opacity: 0.6;"></p>
        </div>
    </div>

    <!-- LOADING OVERLAY -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loader"></div>
        <p>AI is removing background... ✨</p>
    </div>

    <style>
        .iconic-glow {
            background: linear-gradient(45deg, var(--gold), #b8860b) !important;
            color: black !important;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.6) !important;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 700;
            transition: 0.3s;
        }

        .iconic-glow:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(212, 175, 55, 0.9) !important;
        }

        .card-img-container {
            height: 250px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-img-container img {
            max-height: 90%;
            max-width: 90%;
            object-fit: contain;
            transition: transform 0.5s;
        }

        .card:hover .card-img-container img {
            transform: scale(1.1);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            opacity: 0.5;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--deep);
            margin: 10% auto;
            padding: 40px;
            border: 1px solid var(--gold);
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            position: relative;
        }

        .close {
            position: absolute;
            right: 20px;
            top: 10px;
            font-size: 28px;
            cursor: pointer;
            color: var(--gold);
        }

        .modal-select {
            width: 100%;
            padding: 12px;
            background: rgba(43, 13, 13, 0.8);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 10px;
            color: white;
            margin-top: 10px;
            font-family: inherit;
        }

        .modal-select option {
            background-color: #2b0d0d;
            color: white;
        }

        .upload-area {
            border: 2px dashed rgba(212, 175, 55, 0.5);
            padding: 40px 20px;
            text-align: center;
            border-radius: 15px;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-area:hover {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.05);
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 3000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .loader {
            border: 4px solid rgba(212, 175, 55, 0.1);
            border-top: 4px solid var(--gold);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* FOLDER CARD STYLES */
        .folder-card {
            background: #1a0505;
            border-radius: 20px;
            height: 400px;
            text-align: left;
            border: 2px solid rgba(212, 175, 55, 0.1);
            transition: 0.4s;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .folder-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.4);
        }

        .folder-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            transition: 0.4s;
        }

        .folder-card:hover .folder-img {
            opacity: 1;
            transform: scale(1.05);
        }

        .folder-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(26, 5, 5, 0.9);
            padding: 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
        }

        .folder-footer h3 {
            color: white;
            margin: 0;
            font-size: 20px;
            font-weight: 700;
        }

        .item-count-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--gold);
            color: black;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 800;
            z-index: 5;
        }

        .back-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: var(--gold);
            color: black;
        }

        /* REMOVE BUTTON STYLES */
        .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 68, 68, 0.9);
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            opacity: 0;
            transition: 0.3s;
            z-index: 10;
        }

        .card:hover .remove-btn {
            opacity: 1;
        }

        .remove-btn:hover {
            background: #ff0000;
            transform: scale(1.1);
        }
    </style>

    <script>
        const allItems = {{ items | tojson }};
        const categories = {
            'top': { name: 'Tops', image: '/statics/images/tops.jpeg' },
            'pant': { name: 'Bottoms', image: '/statics/images/bottoms.jpeg' },
            'kurti': { name: 'Kurtis', image: '/statics/images/blouses.jpeg' },
            'kurta': { name: 'Kurtas', image: '/statics/images/sarees.jpeg' },
            'blouse': { name: 'Blouses', image: '/statics/images/blouses.jpeg' },
            'saree': { name: 'Sarees', image: '/statics/images/sarees.jpeg' },
            'dress': { name: 'Dresses', image: '/statics/images/dresses.jpeg' },
            'shoes': { name: 'Shoes', image: '/statics/images/shoes.jpeg' },
            'accessory': { name: 'Accessories', image: '/statics/images/jewelleries.jpeg' },
            'jewellery': { name: 'Jewelleries', image: '/statics/images/jewelleries.jpeg' }
        };

        function renderCategories() {
            const grid = document.getElementById('category-grid');
            grid.innerHTML = '';

            const grouped = {};
            allItems.forEach(item => {
                const type = item.item_type.toLowerCase();
                if (!grouped[type]) grouped[type] = [];
                grouped[type].push(item);
            });

            const keys = Object.keys(grouped);
            if (keys.length === 0) {
                document.getElementById('empty-wardrobe').style.display = 'block';
                return;
            } else {
                document.getElementById('empty-wardrobe').style.display = 'none';
            }

            keys.forEach(type => {
                const catInfo = categories[type] || { name: type, image: '/statics/images/tops.jpeg' };
                const count = grouped[type].length;

                const card = document.createElement('div');
                card.className = 'folder-card';
                card.onclick = () => showCategoryItems(type);
                card.innerHTML = `
                    <img src="${catInfo.image}" class="folder-img" alt="${catInfo.name}">
                    <div class="item-count-badge">${count} Items</div>
                    <div class="folder-footer">
                        <h3>${catInfo.name}</h3>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function showCategoryItems(type) {
            const catInfo = categories[type] || { name: type };
            document.getElementById('wardrobe-title-box').style.display = 'none';
            document.getElementById('category-title-box').style.display = 'flex';
            document.getElementById('current-category-name').innerText = catInfo.name;

            document.getElementById('category-grid').style.display = 'none';
            const itemGrid = document.getElementById('items-grid');
            itemGrid.style.display = 'grid';
            itemGrid.innerHTML = '';

            const filtered = allItems.filter(i => i.item_type.toLowerCase() === type);
            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => viewDetail(item.image_url, item.item_type, item.dominant_color, item.style_tag);
                card.innerHTML = `
                    <button class="remove-btn" onclick="removeItem('${item.id}', event)">✕</button>
                    <div class="card-img-container">
                        <img src="${item.image_url}" alt="${item.item_type}">
                    </div>
                    <div class="card-content">
                        <span class="count">${item.dominant_color}</span>
                        <h3>${item.item_type.charAt(0).toUpperCase() + item.item_type.slice(1)}</h3>
                        <p style="opacity: 0.6; font-size: 12px; margin-top: 5px;">${item.style_tag}</p>
                    </div>
                `;
                itemGrid.appendChild(card);
            });
        }

        async function removeItem(itemId, event) {
            event.stopPropagation();
            if (!confirm("Are you sure you want to remove this item?")) return;

            try {
                const res = await fetch(`/remove-wardrobe-item/${itemId}`, { method: 'POST' });
                const data = await res.json();
                if (data.status === 'success') {
                    // Update local list
                    const index = allItems.findIndex(i => i.id === itemId);
                    if (index > -1) {
                        const type = allItems[index].item_type.toLowerCase();
                        allItems.splice(index, 1);

                        // Check if we should go back to collections or refresh current view
                        const remaining = allItems.filter(i => i.item_type.toLowerCase() === type);
                        if (remaining.length === 0) {
                            renderCategories();
                            showCollections();
                        } else {
                            renderCategories(); // Update counts
                            showCategoryItems(type);
                        }
                    }
                } else {
                    alert(data.message);
                }
            } catch (e) {
                console.error(e);
                alert("Error removing item.");
            }
        }

        function showCollections() {
            document.getElementById('wardrobe-title-box').style.display = 'block';
            document.getElementById('category-title-box').style.display = 'none';
            document.getElementById('category-grid').style.display = 'grid';
            document.getElementById('items-grid').style.display = 'none';
        }

        // Initialize
        renderCategories();

        let selectedFile = null;

        function openUploadModal() { document.getElementById('uploadModal').style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function handleFile(input) {
            if (input.files && input.files[0]) {
                selectedFile = input.files[0];
                document.getElementById('upload-status-text').innerHTML = `Selected: ${selectedFile.name} ✅`;

                const reader = new FileReader();
                reader.onload = function (e) {
                    const preview = document.getElementById('uploadPreview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(selectedFile);
            }
        }

        async function uploadItem() {
            if (!selectedFile) { alert("Please choose a photo first!"); return; }

            document.getElementById('loadingOverlay').style.display = 'flex';

            const formData = new FormData();
            formData.append('image', selectedFile);
            formData.append('item_type', document.getElementById('itemType').value);

            try {
                const res = await fetch('{{ url_for("wardrobe.upload_item") }}', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.status === 'success') {
                    window.location.reload();
                } else {
                    alert(data.message);
                    document.getElementById('loadingOverlay').style.display = 'none';
                }
            } catch (e) {
                console.error(e);
                alert("Upload failed. Check console.");
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        function viewDetail(url, type, color, tag) {
            document.getElementById('detailImg').src = url;
            document.getElementById('detailLink').href = url;
            document.getElementById('detailLink').innerText = "View Full Image @ " + url.split('/').pop();
            document.getElementById('detailTitle').innerText = type.charAt(0).toUpperCase() + type.slice(1);
            document.getElementById('detailColor').innerText = "Color: " + color;
            document.getElementById('detailTag').innerText = "#" + tag;
            document.getElementById('detailModal').style.display = 'block';
        }
    </script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
