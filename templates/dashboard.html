<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | VIBE STYLIST</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="scroll-progress" id="scrollIndicator"></div>
    <div class="bg-pattern" style="background-image: url('{{ url_for('static', filename='images/kolam.png') }}');">
    </div>

    <div class="container">
        <header>
            <div class="profile-pic-wrapper">
                <img src="{{ url_for('static', filename='images/profile.png') }}" alt="Profile" class="profile-pic">
                <div class="level-badge">WELCOME</div>
            </div>
            <div class="user-meta">
                <h1>{{ user_name }}</h1>
            </div>
        </header>

        <main class="layout-grid">
            <!-- Analysis Form Section -->
            <section>
                <span class="section-label">New Style Analysis</span>
                <div class="ornate-card">
                    {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                    {% for category, message in messages %}
                    <p style="color: #ef4444; text-align: center; margin-bottom: 2rem; font-family: var(--font-serif);">
                        {{ message }}</p>
                    {% endfor %}
                    {% endif %}
                    {% endwith %}

                    <form method="POST" enctype="multipart/form-data" class="analysis-form">
                        <div class="form-grid">
                            <div class="form-group full-width">
                                <label for="image">Upload Your Photo</label>
                                <div class="file-upload-wrapper">
                                    <input id="image" type="file" name="image" accept=".png,.jpg,.jpeg,.gif,.webp"
                                        required>
                                    <div class="file-upload-design">
                                        <i data-lucide="upload"></i>
                                        <span>Drop your style here or click to browse</span>
                                    </div>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="gender">Gender</label>
                                <select id="gender" name="gender">
                                    <option value="">Prefer not to say</option>
                                    <option value="male">Male</option>
                                    <option value="female">Female</option>
                                    <option value="non-binary">Non-binary</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="mood">Mood</label>
                                <input id="mood" type="text" name="mood" placeholder="e.g. bold, soft, royal">
                            </div>

                            <div class="form-group">
                                <label for="occasion">Occasion</label>
                                <input id="occasion" type="text" name="occasion"
                                    placeholder="e.g. gala, interview, fest">
                            </div>

                            <div class="form-group">
                                <label for="campus_style">Style Preference</label>
                                <select id="campus_style" name="campus_style">
                                    <option value="">Not selected</option>
                                    <option value="minimal">Minimal</option>
                                    <option value="streetwear">Streetwear</option>
                                    <option value="smart-casual">Smart-casual</option>
                                    <option value="ethnic-fusion">Ethnic-fusion</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="budget_tier">Budget</label>
                                <select id="budget_tier" name="budget_tier">
                                    <option value="">Not selected</option>
                                    <option value="low">Low</option>
                                    <option value="medium">Medium</option>
                                    <option value="high">High</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="student_year">Year</label>
                                <select id="student_year" name="student_year">
                                    <option value="">Not selected</option>
                                    <option value="1st year">1st year</option>
                                    <option value="2nd year">2nd year</option>
                                    <option value="3rd year">3rd year</option>
                                    <option value="4th year+">4th year+</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="season">Season</label>
                                <select id="season" name="season">
                                    <option value="">Not selected</option>
                                    <option value="summer">Summer</option>
                                    <option value="monsoon">Monsoon</option>
                                    <option value="winter">Winter</option>
                                    <option value="all-season">All-season</option>
                                </select>
                            </div>

                            <div class="form-group" style="display: flex; align-items: flex-end;">
                                <button type="submit" class="btn-add" style="width: 100%; height: 50px;">Begin
                                    Analysis</button>
                            </div>
                        </div>
                    </form>
                </div>
            </section>
        </main>

        <footer>
            <button class="btn-minimal" onclick="location.href='{{ url_for('auth.logout') }}'"
                style="color: #ef4444;">Sign Out</button>
        </footer>
    </div>
    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
