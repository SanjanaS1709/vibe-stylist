<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIBE STYLIST | Premium AI Fashion Experience</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <div class="scroll-progress" id="scrollIndicator"></div>
  <div class="bg-pattern" style="background-image: url('{{ url_for('static', filename='images/kolam.png') }}');"></div>

  <div class="container">
    <header>
      <div class="profile-pic-wrapper">
        <img src="{{ url_for('static', filename='images/profile.png') }}" alt="Profile" class="profile-pic">
        <div class="level-badge">AI FASHION</div>
      </div>
      <div class="user-meta">
        <h1>VIBE STYLIST</h1>
        <p
          style="font-family: var(--font-serif); color: var(--accent-gold); font-size: 1.2rem; font-style: italic; margin-top: 1rem;">
          Your Premium AI Fashion Experience
        </p>
      </div>
    </header>

    <section style="text-align: center; margin-top: 5rem;">
      <div class="ornate-card" style="display: inline-block; padding: 4rem;">
        <p style="font-family: var(--font-serif); font-size: 1.5rem; margin-bottom: 3rem;">Ready to discover your unique
          vibe?</p>
        <div style="display: flex; gap: 2rem; justify-content: center;">
          <button onclick="location.href='{{ url_for('auth.login') }}'" class="btn-add"
            style="padding: 1rem 3rem;">Login</button>
          <button onclick="location.href='{{ url_for('auth.register') }}'" class="btn-add"
            style="padding: 1rem 3rem; background: transparent; border: 1px solid var(--accent-gold); color: var(--accent-gold);">Register</button>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
