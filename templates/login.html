<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | VIBE STYLIST</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="bg-pattern" style="background-image: url('{{ url_for('static', filename='images/kolam.png') }}');">
    </div>
    <div class="container" style="max-width: 500px; padding-top: 10rem;">
        <header>
            <div class="user-meta">
                <h1>Login</h1>
            </div>
        </header>

        <section>
            <div class="ornate-card" style="padding: 2rem;">
                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                {% for category, message in messages %}
                <p
                    style="color: {% if category == 'error' %}#ef4444{% else %}#10b981{% endif %}; text-align: center; margin-bottom: 1rem; font-family: var(--font-serif);">
                    {{ message }}</p>
                {% endfor %}
                {% endif %}
                {% endwith %}

                <form method="POST">
                    <div class="form-group" style="margin-bottom: 1.5rem;">
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 2rem;">
                        <label for="password">Password</label>
                        <input type="password" name="password" id="password" required>
                    </div>
                    <button type="submit" class="btn-add" style="width: 100%; height: 50px;">Login</button>
                </form>
                <p
                    style="text-align: center; margin-top: 1.5rem; font-family: var(--font-serif); color: var(--text-secondary);">
                    Don't have an account? <a href="{{ url_for('auth.register') }}"
                        style="color: var(--accent-gold);">Register here</a>
                </p>
            </div>
        </section>
    </div>
</body>

</html>
